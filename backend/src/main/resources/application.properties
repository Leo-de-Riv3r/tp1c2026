spring.application.name=tp1c2026

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/tacs_db}
spring.data.mongodb.database=${MONGO_DATABASE:tacs_db}

logging.level.org.springframework.data.mongodb=DEBUG

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:31536000000}

# Permite que el mensaje de las excepciones llegue al cliente
server.error.include-message=always